name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Primary gate: Linux build + unit tests + the C<->Python signing parity check.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev libedit-dev \
            libpcap-dev libhiredis-dev python3 python3-pip
      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build -j"$(nproc)"
      # Exclude tests that need privileges/peers a CI runner lacks: the mTLS
      # end-to-end (needs a live peer) and the raw-socket ICMP probe (CAP_NET_RAW).
      - name: Unit tests
        run: ctest --test-dir build --output-on-failure --timeout 60 -E 'via_e2e|probe_icmp'
      - name: Signing parity (Python verifies a C signature, no canonicalization)
        run: |
          python3 -m pip install --quiet --break-system-packages cryptography || python3 -m pip install --quiet cryptography
          PYTHON=python3 ./scripts/test-signing-parity.sh

  # Portability: macOS native runner. Needs brew OpenSSL 3 (system is LibreSSL,
  # which lacks the EVP_PKEY_ED25519 one-shot the agent uses). Best-effort.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install cmake openssl@3 hiredis libpcap
      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"
      - name: Build
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"
      - name: Unit tests
        run: ctest --test-dir build --output-on-failure --timeout 60 -E 'via_e2e|probe_icmp'

  # Portability: FreeBSD via a VM action (no native FreeBSD runner exists). Best-effort.
  freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build + test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y cmake openssl libedit libpcap hiredis
          run: |
            cmake -S . -B build -DBUILD_TESTING=ON
            cmake --build build
            ctest --test-dir build --output-on-failure --timeout 60 -E 'via_e2e|probe_icmp'
