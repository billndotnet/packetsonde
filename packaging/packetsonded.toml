# packetsonded -- example configuration.
#
# Sections map to env vars (see src/agent/src/config_to_env.c).
# Pre-existing PS_* env vars always win over file values, so operator
# overrides at launch take precedence.

# ---- key storage -----------------------------------------------------
[keys]
# Where the agent looks for its identity keypair and the authorized/
# subdirectory of client pubkeys.
dir = "/etc/packetsonded/keys"

# ---- discovery (knock listener) --------------------------------------
# When enabled, the agent's pcap pipeline inspects every broadcast UDP
# packet for a signed PSDP probe. Validated probes get a unicast reply.
# No listening socket is bound -- the agent is invisible to port scans.
[discovery]
enabled              = "1"
agent_key            = "agent"
authorized_dir       = "/etc/packetsonded/keys/authorized"
# IP advertised in replies. "auto" detects the primary v4.
listen_ip            = "auto"
# Port advertised when not running in knock-then-listen mode.
listen_port          = "0"
# Hard cap on probe.max_skew_ms. 30000 = 30 s.
max_skew_ms_hard_cap = "30000"

# ---- agent listen (--via channel) ------------------------------------
# Mode controls how the inbound mTLS surface behaves:
#   persistent -- always-on TCP listener (classic deployment)
#   knock      -- no idle socket; sessions only via signed knocks
#   both       -- both call patterns supported
[agent_listen]
mode             = "knock"
addr             = "0.0.0.0"
port             = "8442"
key              = "agent"
authorized_dir   = "/etc/packetsonded/keys/authorized"
max_clients      = "64"
packetsonde_bin  = "/usr/local/bin/packetsonde"

# ---- NetFlow / IPFIX export ------------------------------------------
# Sends expired flows to a collector. 5 = NetFlow v5, 9 = NetFlow v9,
# 10 = IPFIX. All three carry IANA-standard field IDs.
[netflow]
collector = "127.0.0.1:2055"
version   = "9"
source_id = "20563"

# ---- central management (rna-packetsonde) ----------------------------
# When url is set, the agent enrolls with central on first boot and checks
# in periodically. http:// is fine for dev; use https:// + verify in prod.
[central]
url             = ""            # e.g. https://central.example:8700  (empty = disabled)
agent_id        = ""            # empty -> hostname
deployment_mode = "host"        # host | proxy | trunk | bridge
verify          = "1"           # 0 to skip TLS verify (dev / self-signed)
ca_cert         = ""            # optional internal CA pin
checkin_seconds = "60"
report_mode     = "direct"      # "relay" -> forward events through relay_via instead of POSTing central
relay_via       = ""            # edge: relay agent name when report_mode = "relay"

# ---- relay role ------------------------------------------------------
# A relay accepts ingest frames from edge agents over the mTLS channel,
# appends a signed chain-of-custody attestation, and forwards to central.
[relay]
role          = "0"             # "1" on a relay-capable agent
allow_sources = ""              # comma-separated agent_ids/fingerprints this relay forwards for

# ---- detect -- process/file/socket collection (Linux) -----------------
# Process/file/socket collection (Linux). Off by default. See
# docs/specs/2026-06-03-process-collection-primitives-design.md
[detect]
enabled        = "0"
# host baseline default; SERVICE ROLE template adds drop zones + role data dirs, e.g.
#   watch_paths = "/etc,/home,/tmp,/dev/shm,/var/tmp,/var/www"
watch_paths    = "/etc,/home"   # comma-separated; configurable + role-templated
suppress_paths = ""             # coarse read-only suppression prefixes ("comm:/prefix" allowed)
max_depth      = "16"           # ancestry-walk cap
max_events_ps  = "2000"         # global events/sec cap (drop + count over)
# sink = "/var/lib/packetsonde/activity.jsonl"   # where collected records are written
# A mount-wide FAN_OPEN_EXEC mark is always set when enabled=1 (independent of
# watch_paths) so any execve is caught — see the spec Detection-boundary section.
